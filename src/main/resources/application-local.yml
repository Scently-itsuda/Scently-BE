spring:
  config:
    activate:
      on-profile: local

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 모든 db url 뒤에 rewriteBatchedStatements=true 반드시 추가
    url: jdbc:mysql://localhost:3306/scently?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&profileSQL=true&logger=Slf4JLogger&maxQuerySizeToLog=999999
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        highlight_sql: true
      default_batch_fetch_size: 100

  logging.level:
    org:
      hibernate:
        # sql 출력
        SQL: debug
        type:
          descriptor:
            # sql 실행시 binding 되는 파라미터의 값이 ??로 뜨는데 그 값을 보여주는 옵션
            sql: trace
      springframework:
          security: DEBUG
          security.oauth2: DEBUG
          jdbc: debug

# 로컬 환경 설정
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
  server:
    url: http://localhost:8080  # 로컬 환경의 서버 URL
