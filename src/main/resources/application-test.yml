spring:
  config:
    activate:
      on-profile: test

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:scently
    username: sa
    password:

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
      default_batch_fetch_size: 100

  logging.level:
    org:
      hibernate:
        # sql 출력
        SQL: debug
        type:
          descriptor:
            # sql 실행시 binding 되는 파라미터의 값이 ??로 뜨는데 그 값을 보여주는 옵션
            sql: trace
      springframework:
          security: DEBUG
          security.oauth2: DEBUG

  security:
    oauth2:
      client:
        registration:
          naver:
            client-name: Naver
            client-id: test
            client-secret: test
            redirect-uri: test
            authorization-grant-type: authorization_code
            scope:
              - email
              - profile_image

          kakao:
            client-name: kakao
            client-id: test
            client-secret: test
            redirect-uri: test
            authorization-grant-type: authorization_code
            scope:
              - account_email
              - profile_image
            client-authentication-method: client_secret_post

          google:
            client-name: Google
            client-id: test
            client-secret: test
            redirect-uri: test
            scope:
              - email
              - profile

        # 이 값들은 네이버 OAuth2 API 문서에서 제공하는 기본적인 설정이므로, 네이버 API에 맞춰 고정된 값으로 사용되며, 특별한 사유가 없다면 변경하지 않아도 된다.
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize   # authorization-uri: 네이버 로그인 페이지로 리디렉션하여 사용자에게 인증을 요청하는 URI.
            token-uri: https://nid.naver.com/oauth2.0/token   #token-uri: 인증 코드로 액세스 토큰을 받기 위한 URI
            user-info-uri: https://openapi.naver.com/v1/nid/me    #user-info-uri: 액세스 토큰을 통해 사용자 정보를 가져오는 URI
            user-name-attribute: response     #user-name-attribute: 네이버에서 반환하는 사용자 정보 중 사용자 이름을 나타내는 속성 (response는 네이버에서 기본적으로 반환되는 사용자 정보 객체의 최상위 필드)
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# 로컬 환경 설정
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
  server:
    url: http://localhost:8080  # 로컬 환경의 서버 URL

